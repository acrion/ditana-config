name: Package configuration archive

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kdlfmt
        uses: hougesen/kdlfmt@main

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

      - name: Create archive
        run: |
          git rev-parse --short HEAD > config_hash.txt
          git log -1 --format='%cd' --date=format:'%Y-%m-%d %H:%M %Z' > config_date.txt
          tar czf ditana-config.tar.gz \
            installation-steps.kdl \
            settings/ \
            folders/ \
            config_hash.txt \
            config_date.txt

      - name: Update rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          commit: ${{ github.sha }}
          name: Latest configuration
          body: |
            Automatically built from commit ${{ github.sha }}.

            Download `ditana-config.tar.gz` and extract alongside the installer.
          artifacts: ditana-config.tar.gz
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true