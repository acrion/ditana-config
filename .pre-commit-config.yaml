repos:
  - repo: local
    hooks:
      - id: kdlfmt
        name: KDL syntax validation
        entry: |
          bash -c '
            # Check if kdlfmt is installed
            if ! command -v kdlfmt >/dev/null 2>&1; then
              echo "Info: kdlfmt is not installed. Skipping KDL validation." >&2
              exit 0
            fi

            failed=0
            for file in "$@"; do
              # Pure syntax check (no formatting, no style enforcement)
              if ! kdlfmt format --stdin < "$file" >/dev/null; then
                echo "❌ Syntax error in KDL file: $file" >&2
                failed=1
              fi
            done

            if [ "$failed" -eq 1 ]; then
              exit 1
            fi
          ' --
        language: system
        files: \.kdl$
        pass_filenames: true
        verbose: true