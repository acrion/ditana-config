repos:
  - repo: local
    hooks:
      - id: kdlfmt
        name: KDL syntax validation
        entry: |
          bash -c '
            if ! command -v kdlfmt >/dev/null 2>&1; then
              echo "Info: kdlfmt is not installed. Skipping KDL validation." >&2
              exit 0
            fi

            failed=0
            for file in "$@"; do
              if ! kdlfmt format --stdin < "$file" >/dev/null; then
                echo "❌ Syntax error in KDL file: $file" >&2
                failed=1
              fi
            done
            exit $failed
          ' --
        language: system
        files: \.kdl$
        pass_filenames: true
        verbose: true

      - id: validate-kdl-via-json
        name: Validate KDL data against JSON Schema
        language: python
        additional_dependencies: ['jsonschema']
        entry: |
          bash -c '
            set -e
            echo "⚙️  Building json-kdl-converter..."
            cargo build --manifest-path json-kdl-converter/Cargo.toml --release -q

            echo "🔄 Converting KDL to JSON..."
            json-kdl-converter/target/release/json-kdl-converter kdlset2json . /tmp/ditana-config.json

            echo "🔍 Validating JSON against ditana-schema.json..."

            # Use a strict Python one-liner to avoid any YAML indentation issues on GitHub Actions
            python -c "import json; from jsonschema import validate; validate(instance=json.load(open('\''/tmp/ditana-config.json'\'')), schema=json.load(open('\''ditana-schema.json'\''))); print('\''✅ Validation successful!'\'')"
          ' --
        pass_filenames: false
        always_run: true