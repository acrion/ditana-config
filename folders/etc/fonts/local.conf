<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>@@MONOSPACE_FONT_FAMILY@@</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>@@SERIF_FONT_FAMILY@@</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test name="family"><string>@@MONOSPACE_FONT_FAMILY@@</string></test>
    <edit name="priority" mode="assign"><int>100</int></edit>
  </match>

</fontconfig>
