# Fallback for apps not picking up the theme via gsettings
GTK_THEME=Dracula

# Tells Qt6 apps to load the qt6ct platform-theme plugin, which reads
# ~/.config/qt6ct/qt6ct.conf and applies the Ditana Dark palette defined
# there. Without this variable, Qt6 apps ignore qt6ct entirely and fall
# back to their built-in defaults (typically a light Fusion palette),
# which clashes with the rest of the desktop. niri-settings (PyQt6) is
# an example that needs this to look right.
QT_QPA_PLATFORMTHEME=qt6ct
