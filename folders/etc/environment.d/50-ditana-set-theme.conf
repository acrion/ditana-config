# Fallback for apps not picking up the theme via gsettings
GTK_THEME=Dracula

# Tells Qt5/Qt6 apps to load the qt5ct/qt6ct platform-theme plugin, which reads
# ~/.config/qt5ct/qt5ct.conf / ~/.config/qt6ct/qt6ct.conf and applies the Ditana
# Dark palette defined there. Without this variable, Qt apps ignore qt5ct/qt6ct
# entirely and fall back to their built-in defaults (typically a light Fusion
# palette), which clashes with the rest of the desktop. niri-settings (PyQt6) is
# an example that needs this to look right. https://wiki.archlinux.org/title/Qt
QT_QPA_PLATFORMTHEME=qt5ct:qt6ct
