# XDG Base Directory Specification defaults, set explicitly for robustness
# and visibility. See https://specifications.freedesktop.org/basedir-spec/
# systemd reads this for all user sessions regardless of compositor.
XDG_DATA_HOME=${HOME}/.local/share
XDG_CONFIG_HOME=${HOME}/.config
XDG_STATE_HOME=${HOME}/.local/state
XDG_CACHE_HOME=${HOME}/.cache
