binding_3 = <alt> KEY_F2
binding_4 = <alt> KEY_PAGEUP
binding_5 = <alt> KEY_PAGEDOWN
binding_6 = <super> KEY_SPACE
binding_7 = <shift> <ctrl> KEY_ESC
binding_8 = <ctrl> KEY_E
command_0 = grim -g "$(slurp)" - | wl-copy --type image/png
command_1 = rofi -show combi -modes combi -combi-modes "drun,run" -theme fancy
command_2 = swaylock -f -c 000000
command_3 = nwggrid -p
command_4 = pactl set-sink-volume @DEFAULT_SINK@ +5%
command_5 = pactl set-sink-volume @DEFAULT_SINK@ -5s%
command_6 = /usr/bin/catfish
command_7 = /usr/bin/resources
command_8 = rofi -modi emoji -show emoji

