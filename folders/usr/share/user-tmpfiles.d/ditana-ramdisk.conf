# Create a private RAM-backed scratch directory for the user, exposed as
# ~/RAMDisk and via $RAMDISK. The target lives in the runtime directory
# (tmpfs), which logind wipes when the user's last session ends.
#
# Type  Path          Mode  User  Group  Age  Argument
d       %t/ramdisk    0700  -     -      -
L       %h/RAMDisk    -     -     -      -    %t/ramdisk
