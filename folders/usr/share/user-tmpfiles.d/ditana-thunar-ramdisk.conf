# Add a "RAM Disk" entry to the user's GTK/Thunar bookmarks file on first
# login. The `f` type writes the file only if it does not already exist,
# so any bookmarks the user adds later through Thunar's UI are preserved.
# The bookmark target uses %t (XDG_RUNTIME_DIR) to point directly at the
# tmpfs location, matching the $RAMDISK environment variable.
#
# Type  Path                            Mode  User  Group  Age  Argument
f       %h/.config/gtk-3.0/bookmarks    0644  -     -      -    file://%h/RAMDisk RAM Disk
